
[[collection]]
type = "card"
title = "VRSIL: Video Recommendation with Semantic Intelligence"
subtitle = "Anubrat Bora and Dr. Gerard Deepak"
link = "https://link.springer.com/chapter/10.1007/978-3-031-96473-2_2"
content = "This research presents a strategic model for video recommendation in the Web 3.0 era, integrating hybrid machine intelligence, generative AI, and semantic artificial intelligence. It dynamically generates ontologies from query words to extract features based on similarity and employs a logistic regression classifier for dataset categorization. By incorporating semantic reasoning with Normalized Pointwise Mutual Information (NPMI) and optimizing recommendations through the Elephant Optimization algorithm, it enhances accuracy, diversity, and relevance in video recommendation systems."

[[collection]]
type = "card"
title = "SSCKC: Semantics-Driven Crime Data Classification Framework"
subtitle = "Anubrat Bora and Dr. Gerard Deepak"
link = "https://ceur-ws.org/Vol-3940/AISD-2024_Paper_7.pdf"
content = "This research presents a strategic framework for classifying criminology and news datasets, enhancing their relevance for expert systems. It integrates LLaMA with XGBoost for efficient categorization and enrichment. Using standard news APIs and the Cricket Algorithm with a diversity index, it optimizes precision, accuracy, and F1 score in crime classification."
